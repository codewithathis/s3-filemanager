<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS S3 File Manager</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 28px;
            font-weight: 600;
        }

        .header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            height: calc(100vh - 140px);
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }

        .file-explorer {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: inherit;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #229954;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        .btn-warning:hover {
            background: #e67e22;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        .file-input {
            display: none;
        }

        .bucket-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bucket-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: rgba(236, 240, 241, 0.5);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .bucket-item:hover {
            background: rgba(52, 152, 219, 0.1);
            border-color: #3498db;
        }

        .bucket-item.active {
            background: rgba(52, 152, 219, 0.2);
            border-color: #3498db;
        }

        .bucket-item .bucket-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bucket-item .bucket-actions {
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .bucket-item:hover .bucket-actions {
            opacity: 1;
        }

        .file-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .file-table th {
            background: #34495e;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        .file-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #ecf0f1;
        }

        .file-table tr:hover {
            background: rgba(52, 152, 219, 0.05);
        }

        .file-row.selected {
            background: rgba(52, 152, 219, 0.1);
        }

        .file-icon {
            width: 20px;
            text-align: center;
            margin-right: 10px;
        }

        .file-name {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .file-actions {
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .file-row:hover .file-actions {
            opacity: 1;
        }

        .checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .spinner {
            border: 3px solid #ecf0f1;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 20px;
            color: #bdc3c7;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 15px;
            min-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #2c3e50;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #7f8c8d;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(236, 240, 241, 0.5);
            border-radius: 10px;
        }

        .toolbar-left, .toolbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 10px;
            font-size: 14px;
        }

        .breadcrumb-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .breadcrumb-item:hover {
            background: rgba(52, 152, 219, 0.2);
        }

        .breadcrumb-separator {
            color: #7f8c8d;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(236, 240, 241, 0.5);
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
            color: #7f8c8d;
        }

        .multi-select-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar {
            width: 200px;
            height: 6px;
            background: #ecf0f1;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #3498db;
            transition: width 0.3s;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .toolbar {
                flex-direction: column;
                gap: 10px;
            }
            
            .toolbar-left, .toolbar-right {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fab fa-aws" style="font-size: 32px; color: #ff9900;"></i>
                <h1>AWS S3 File Manager</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="refreshData()">
                    <i class="fas fa-sync-alt"></i>
                    Refresh
                </button>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <h3><i class="fas fa-database"></i> Buckets</h3>
                <div class="bucket-list" id="bucketList">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading buckets...
                    </div>
                </div>
                <div style="margin-top: 20px;">
                    <button class="btn btn-success" onclick="showCreateBucketModal()">
                        <i class="fas fa-plus"></i>
                        Create Bucket
                    </button>
                </div>
            </div>

            <div class="file-explorer">
                <div class="breadcrumb" id="breadcrumb">
                    <div class="breadcrumb-item" onclick="navigateToRoot()">
                        <i class="fas fa-home"></i>
                        Home
                    </div>
                </div>

                <div class="toolbar">
                    <div class="toolbar-left">
                        <button class="btn btn-primary" onclick="uploadFiles()">
                            <i class="fas fa-upload"></i>
                            Upload Files
                        </button>
                        <button class="btn btn-success" onclick="createFolder()">
                            <i class="fas fa-folder-plus"></i>
                            New Folder
                        </button>
                        <button class="btn btn-warning" id="multiSelectBtn" onclick="toggleMultiSelect()" style="display: none;">
                            <i class="fas fa-check-square"></i>
                            Multi-Select
                        </button>
                    </div>
                    <div class="toolbar-right">
                        <button class="btn btn-danger" id="deleteSelectedBtn" onclick="deleteSelected()" style="display: none;">
                            <i class="fas fa-trash"></i>
                            Delete Selected
                        </button>
                        <button class="btn btn-secondary" onclick="downloadSelected()" id="downloadSelectedBtn" style="display: none;">
                            <i class="fas fa-download"></i>
                            Download Selected
                        </button>
                    </div>
                </div>

                <div class="file-content" id="fileContent">
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <h3>Select a bucket to start</h3>
                        <p>Choose a bucket from the sidebar to browse its contents</p>
                    </div>
                </div>

                <div class="status-bar">
                    <div class="multi-select-info" id="multiSelectInfo" style="display: none;">
                        <span id="selectedCount">0</span> items selected
                    </div>
                    <div class="progress-bar" id="progressBar" style="display: none;">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>
                </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" class="file-input" multiple>

    <!-- Create Bucket Modal -->
    <div class="modal" id="createBucketModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-database"></i> Create New Bucket</h3>
                <button class="modal-close" onclick="closeModal('createBucketModal')">&times;</button>
            </div>
            <div class="form-group">
                <label for="newBucketName">Bucket Name:</label>
                <input type="text" id="newBucketName" placeholder="Enter bucket name">
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn btn-secondary" onclick="closeModal('createBucketModal')">Cancel</button>
                <button class="btn btn-success" onclick="createBucket()">Create Bucket</button>
            </div>
        </div>
    </div>

    <!-- Create Folder Modal -->
    <div class="modal" id="createFolderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-folder-plus"></i> Create New Folder</h3>
                <button class="modal-close" onclick="closeModal('createFolderModal')">&times;</button>
            </div>
            <div class="form-group">
                <label for="newFolderName">Folder Name:</label>
                <input type="text" id="newFolderName" placeholder="Enter folder name">
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn btn-secondary" onclick="closeModal('createFolderModal')">Cancel</button>
                <button class="btn btn-success" onclick="createFolderConfirm()">Create Folder</button>
            </div>
        </div>
    </div>

    <!-- Rename Modal -->
    <div class="modal" id="renameModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-edit"></i> Rename</h3>
                <button class="modal-close" onclick="closeModal('renameModal')">&times;</button>
            </div>
            <div class="form-group">
                <label for="renameInput">New Name:</label>
                <input type="text" id="renameInput" placeholder="Enter new name">
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn btn-secondary" onclick="closeModal('renameModal')">Cancel</button>
                <button class="btn btn-success" onclick="renameConfirm()">Rename</button>
            </div>
        </div>
    </div>

    <script>
        let currentBucket = null;
        let currentPrefix = '';
        let selectedItems = new Set();
        let isMultiSelectMode = false;

        const API = 'api.php';

        // Utility functions
        function showLoading(elementId) {
            document.getElementById(elementId).innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Loading...
                </div>
            `;
        }

        function showError(elementId, message) {
            document.getElementById(elementId).innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>Error</h3>
                    <p>${message}</p>
                </div>
            `;
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleString();
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp'];
            const docExts = ['pdf', 'doc', 'docx', 'txt', 'rtf'];
            const videoExts = ['mp4', 'avi', 'mov', 'wmv', 'flv'];
            const audioExts = ['mp3', 'wav', 'flac', 'aac'];
            const archiveExts = ['zip', 'rar', '7z', 'tar', 'gz'];

            if (imageExts.includes(ext)) return 'fas fa-image';
            if (docExts.includes(ext)) return 'fas fa-file-alt';
            if (videoExts.includes(ext)) return 'fas fa-video';
            if (audioExts.includes(ext)) return 'fas fa-music';
            if (archiveExts.includes(ext)) return 'fas fa-archive';
            return 'fas fa-file';
        }

        // API functions
        async function apiCall(action, params = {}) {
            const url = new URL(API, window.location.href);
            url.searchParams.set('action', action);
            
            for (const [key, value] of Object.entries(params)) {
                url.searchParams.set(key, value);
            }

            const response = await fetch(url);
            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error);
            }
            
            return data;
        }

        async function apiCallPost(action, formData) {
            const url = new URL(API, window.location.href);
            url.searchParams.set('action', action);

            const response = await fetch(url, {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error);
            }
            
            return data;
        }

        // Bucket management
        async function loadBuckets() {
            try {
                showLoading('bucketList');
                const data = await apiCall('listBuckets');
                
                const bucketList = document.getElementById('bucketList');
                bucketList.innerHTML = '';
                
                data.forEach(bucket => {
                    const bucketItem = document.createElement('div');
                    bucketItem.className = 'bucket-item';
                    bucketItem.innerHTML = `
                        <div class="bucket-info">
                            <i class="fas fa-database" style="color: #ff9900;"></i>
                            <span>${bucket.Name}</span>
                        </div>
                        <div class="bucket-actions">
                            <button class="btn btn-secondary" onclick="deleteBucket('${bucket.Name}')" title="Delete Bucket">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    `;
                    bucketItem.onclick = (e) => {
                        if (!e.target.closest('.bucket-actions')) {
                            selectBucket(bucket.Name);
                        }
                    };
                    bucketList.appendChild(bucketItem);
                });
            } catch (error) {
                showError('bucketList', error.message);
            }
        }

        function selectBucket(bucketName) {
            currentBucket = bucketName;
            currentPrefix = '';
            selectedItems.clear();
            updateMultiSelectUI();
            
            // Update active bucket in sidebar
            document.querySelectorAll('.bucket-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.closest('.bucket-item').classList.add('active');
            
            loadObjects();
        }

        async function createBucket() {
            const bucketName = document.getElementById('newBucketName').value.trim();
            if (!bucketName) {
                alert('Please enter a bucket name');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('bucket', bucketName);
                await apiCallPost('createBucket', formData);
                closeModal('createBucketModal');
                document.getElementById('newBucketName').value = '';
                loadBuckets();
            } catch (error) {
                alert('Error creating bucket: ' + error.message);
            }
        }

        async function deleteBucket(bucketName) {
            if (!confirm(`Are you sure you want to delete bucket "${bucketName}"? This action cannot be undone.`)) {
                return;
            }

            try {
                const formData = new FormData();
                formData.append('bucket', bucketName);
                await apiCallPost('deleteBucket', formData);
                loadBuckets();
                if (currentBucket === bucketName) {
                    currentBucket = null;
                    showEmptyState();
                }
            } catch (error) {
                alert('Error deleting bucket: ' + error.message);
            }
        }

        // File/Folder management
        async function loadObjects() {
            if (!currentBucket) return;

            try {
                showLoading('fileContent');
                const data = await apiCall('listObjects', {
                    bucket: currentBucket,
                    prefix: currentPrefix
                });
                
                renderObjects(data);
            } catch (error) {
                showError('fileContent', error.message);
            }
        }

        function renderObjects(data) {
            const fileContent = document.getElementById('fileContent');
            const items = data || [];
            
            if (items.length === 0) {
                fileContent.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <h3>Empty folder</h3>
                        <p>This folder is empty. Upload files or create a new folder to get started.</p>
                    </div>
                `;
                return;
            }

            const table = document.createElement('table');
            table.className = 'file-table';
            
            const thead = document.createElement('thead');
            thead.innerHTML = `
                <tr>
                    <th style="width: 50px;">
                        <input type="checkbox" class="checkbox" id="selectAll" onchange="toggleSelectAll()">
                    </th>
                    <th>Name</th>
                    <th>Size</th>
                    <th>Last Modified</th>
                    <th style="width: 200px;">Actions</th>
                </tr>
            `;
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            
            items.forEach(item => {
                const name = item.Key.replace(currentPrefix, '');
                const size = formatFileSize(item.Size);
                const modified = formatDate(item.LastModified);
                const icon = getFileIcon(name);
                const iconColor = '#7f8c8d';

                const tr = document.createElement('tr');
                tr.className = 'file-row';
                tr.dataset.key = item.Key;
                tr.dataset.type = 'file';
                
                tr.innerHTML = `
                    <td>
                        <input type="checkbox" class="checkbox" onchange="toggleItemSelection('${item.Key}')">
                    </td>
                    <td>
                        <div class="file-name" onclick="downloadFile('${item.Key}')">
                            <i class="${icon}" style="color: ${iconColor};" class="file-icon"></i>
                            ${name}
                        </div>
                    </td>
                    <td>${size}</td>
                    <td>${modified}</td>
                    <td>
                        <div class="file-actions">
                            <button class="btn btn-secondary" onclick="downloadFile('${item.Key}')" title="Download">
                                <i class="fas fa-download"></i>
                            </button>
                            <button class="btn btn-warning" onclick="renameItem('${item.Key}')" title="Rename">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-danger" onclick="deleteFile('${item.Key}')" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            table.appendChild(tbody);
            fileContent.innerHTML = '';
            fileContent.appendChild(table);
        }

        async function downloadFile(key) {
            try {
                const data = await apiCall('download', {
                    bucket: currentBucket,
                    key: key
                });
                
                if (data.url) {
                    window.open(data.url, '_blank');
                }
            } catch (error) {
                alert('Error downloading file: ' + error.message);
            }
        }

        async function deleteFile(key) {
            if (!confirm(`Are you sure you want to delete "${key}"?`)) {
                return;
            }

            try {
                const formData = new FormData();
                formData.append('bucket', currentBucket);
                formData.append('key', key);
                
                await apiCallPost('delete', formData);
                loadObjects();
            } catch (error) {
                alert('Error deleting file: ' + error.message);
            }
        }

        function renameItem(key) {
            const currentName = key.split('/').pop();
            alert('Rename functionality will be implemented');
        }

        // Multi-select functionality
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.file-row .checkbox');
            
            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAll.checked;
                const row = checkbox.closest('.file-row');
                const key = row.dataset.key;
                
                if (selectAll.checked) {
                    selectedItems.add(key);
                    row.classList.add('selected');
                } else {
                    selectedItems.delete(key);
                    row.classList.remove('selected');
                }
            });
            
            updateMultiSelectUI();
        }

        function toggleItemSelection(key) {
            const row = document.querySelector(`[data-key="${key}"]`);
            const checkbox = row.querySelector('.checkbox');
            
            if (checkbox.checked) {
                selectedItems.add(key);
                row.classList.add('selected');
            } else {
                selectedItems.delete(key);
                row.classList.remove('selected');
            }
            
            updateMultiSelectUI();
        }

        function updateMultiSelectUI() {
            const multiSelectInfo = document.getElementById('multiSelectInfo');
            const selectedCount = document.getElementById('selectedCount');
            const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
            const downloadSelectedBtn = document.getElementById('downloadSelectedBtn');
            const multiSelectBtn = document.getElementById('multiSelectBtn');
            
            if (selectedItems.size > 0) {
                selectedCount.textContent = selectedItems.size;
                multiSelectInfo.style.display = 'flex';
                deleteSelectedBtn.style.display = 'inline-flex';
                downloadSelectedBtn.style.display = 'inline-flex';
            } else {
                multiSelectInfo.style.display = 'none';
                deleteSelectedBtn.style.display = 'none';
                downloadSelectedBtn.style.display = 'none';
            }
            
            if (currentBucket) {
                multiSelectBtn.style.display = 'inline-flex';
            } else {
                multiSelectBtn.style.display = 'none';
            }
        }

        function showEmptyState() {
            document.getElementById('fileContent').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-folder-open"></i>
                    <h3>Select a bucket to start</h3>
                    <p>Choose a bucket from the sidebar to browse its contents</p>
                </div>
            `;
        }

        function refreshData() {
            if (currentBucket) {
                loadObjects();
            } else {
                loadBuckets();
            }
        }

        function showCreateBucketModal() {
            document.getElementById('createBucketModal').style.display = 'block';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function uploadFiles() {
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const files = e.target.files;
            if (files.length === 0) return;

            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            progressBar.style.display = 'block';

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const progress = ((i + 1) / files.length) * 100;
                progressFill.style.width = progress + '%';

                try {
                    const formData = new FormData();
                    formData.append('bucket', currentBucket);
                    formData.append('path', currentPrefix);
                    formData.append('file', file);
                    
                    await apiCallPost('upload', formData);
                } catch (error) {
                    console.error('Upload error:', error);
                }
            }

            progressBar.style.display = 'none';
            e.target.value = '';
            loadObjects();
        });

        function createFolder() {
            if (!currentBucket) {
                alert('Please select a bucket first');
                return;
            }
            document.getElementById('createFolderModal').style.display = 'block';
        }

        async function createFolderConfirm() {
            const folderName = document.getElementById('newFolderName').value.trim();
            if (!folderName) {
                alert('Please enter a folder name');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('bucket', currentBucket);
                formData.append('path', currentPrefix + folderName + '/');
                
                await apiCallPost('createFolder', formData);
                closeModal('createFolderModal');
                document.getElementById('newFolderName').value = '';
                loadObjects();
            } catch (error) {
                alert('Error creating folder: ' + error.message);
            }
        }

        function navigateToRoot() {
            currentPrefix = '';
            selectedItems.clear();
            updateMultiSelectUI();
            loadObjects();
            updateBreadcrumb();
        }

        function updateBreadcrumb() {
            const breadcrumb = document.getElementById('breadcrumb');
            const parts = currentPrefix.split('/').filter(Boolean);
            
            let html = `
                <div class="breadcrumb-item" onclick="navigateToRoot()">
                    <i class="fas fa-home"></i>
                    Home
                </div>
            `;
            
            let currentPath = '';
            parts.forEach((part, index) => {
                currentPath += part + '/';
                html += `
                    <span class="breadcrumb-separator">/</span>
                    <div class="breadcrumb-item" onclick="openFolder('${currentPath}')">
                        ${part}
                    </div>
                `;
            });
            
            breadcrumb.innerHTML = html;
        }

        function openFolder(prefix) {
            currentPrefix = prefix;
            selectedItems.clear();
            updateMultiSelectUI();
            loadObjects();
            updateBreadcrumb();
        }

        function toggleMultiSelect() {
            isMultiSelectMode = !isMultiSelectMode;
            selectedItems.clear();
            updateMultiSelectUI();
            
            const btn = document.getElementById('multiSelectBtn');
            if (isMultiSelectMode) {
                btn.innerHTML = '<i class="fas fa-times"></i> Exit Multi-Select';
                btn.className = 'btn btn-warning';
            } else {
                btn.innerHTML = '<i class="fas fa-check-square"></i> Multi-Select';
                btn.className = 'btn btn-warning';
            }
        }

        async function deleteSelected() {
            if (selectedItems.size === 0) return;
            
            if (!confirm(`Are you sure you want to delete ${selectedItems.size} selected items?`)) {
                return;
            }

            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            progressBar.style.display = 'block';

            let completed = 0;
            for (const key of selectedItems) {
                try {
                    const formData = new FormData();
                    formData.append('bucket', currentBucket);
                    formData.append('key', key);
                    await apiCallPost('delete', formData);
                } catch (error) {
                    console.error('Delete error:', error);
                }
                completed++;
                progressFill.style.width = (completed / selectedItems.size) * 100 + '%';
            }

            progressBar.style.display = 'none';
            selectedItems.clear();
            updateMultiSelectUI();
            loadObjects();
        }

        async function downloadSelected() {
            if (selectedItems.size === 0) return;
            
            for (const key of selectedItems) {
                try {
                    const data = await apiCall('download', {
                        bucket: currentBucket,
                        key: key
                    });
                    
                    if (data.url) {
                        window.open(data.url, '_blank');
                    }
                } catch (error) {
                    console.error('Download error:', error);
                }
            }
        }

        function renameItem(key) {
            const currentName = key.split('/').pop();
            document.getElementById('renameInput').value = currentName;
            document.getElementById('renameInput').dataset.originalKey = key;
            document.getElementById('renameModal').style.display = 'block';
        }

        async function renameConfirm() {
            const newName = document.getElementById('renameInput').value.trim();
            const originalKey = document.getElementById('renameInput').dataset.originalKey;
            
            if (!newName) {
                alert('Please enter a new name');
                return;
            }

            try {
                const newKey = originalKey.substring(0, originalKey.lastIndexOf('/') + 1) + newName;
                const formData = new FormData();
                formData.append('bucket', currentBucket);
                formData.append('from', originalKey);
                formData.append('to', newKey);
                
                await apiCallPost('rename', formData);
                closeModal('renameModal');
                loadObjects();
            } catch (error) {
                alert('Error renaming item: ' + error.message);
            }
        }

        // Close modals when clicking outside
        window.onclick = function(event) {
            const modals = document.querySelectorAll('.modal');
            modals.forEach(modal => {
                if (event.target === modal) {
                    modal.style.display = 'none';
                }
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadBuckets();
        });
    </script>
</body>
</html>
